<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Suscripciones Semanales</title>
    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f5f5f5;
            --color-background-info: #e6f1fb;
            --color-border-tertiary: rgba(0, 0, 0, 0.15);
            --color-border-secondary: rgba(0, 0, 0, 0.3);
            --color-border-primary: rgba(0, 0, 0, 0.4);
            --color-border-info: #378add;
            --color-text-primary: #000000;
            --color-text-secondary: #666666;
            --color-text-info: #185fa5;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background-primary: #1a1a1a;
                --color-background-secondary: #2d2d2d;
                --color-background-info: #0c447c;
                --color-border-tertiary: rgba(255, 255, 255, 0.15);
                --color-border-secondary: rgba(255, 255, 255, 0.3);
                --color-border-primary: rgba(255, 255, 255, 0.4);
                --color-border-info: #85b7eb;
                --color-text-primary: #ffffff;
                --color-text-secondary: #999999;
                --color-text-info: #b5d4f4;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-sans); 
            background: var(--color-background-secondary);
            color: var(--color-text-primary);
            padding: 1rem;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        .title { 
            font-size: 24px; 
            font-weight: 500; 
            margin-bottom: 2rem;
            text-align: center;
            color: var(--color-text-primary);
        }
        
        .week-selector { display: flex; gap: 8px; margin-bottom: 2rem; }
        .week-selector button {
            flex: 1;
            padding: 10px 12px;
            border: 0.5px solid var(--color-border-secondary);
            background: var(--color-background-primary);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--color-text-secondary);
        }
        .week-selector button:hover { 
            border-color: var(--color-border-primary); 
            background: var(--color-background-secondary);
        }
        .week-selector button.active {
            background: var(--color-background-info);
            border-color: var(--color-border-info);
            color: var(--color-text-info);
        }
        
        .card { 
            background: var(--color-background-primary); 
            border: 0.5px solid var(--color-border-tertiary); 
            border-radius: var(--border-radius-lg); 
            padding: 2rem; 
            margin-bottom: 1.5rem; 
        }
        
        .header { margin-bottom: 1.5rem; }
        .header h2 { 
            font-size: 18px; 
            font-weight: 500; 
            color: var(--color-text-primary); 
            margin-bottom: 0.5rem; 
        }
        .header p { 
            font-size: 14px; 
            color: var(--color-text-secondary); 
        }
        
        .suscripciones-list { margin-bottom: 1.5rem; }
        .suscripcion-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid var(--color-border-tertiary);
        }
        .suscripcion-item:last-child { border-bottom: none; }
        
        .suscripcion-name { 
            font-size: 15px; 
            font-weight: 500; 
            color: var(--color-text-primary); 
        }
        .suscripcion-dia { 
            font-size: 13px; 
            color: var(--color-text-secondary); 
            margin-top: 2px; 
        }
        
        .suscripcion-monto { 
            font-size: 16px; 
            font-weight: 500; 
            color: var(--color-text-info); 
        }
        
        .total-section { 
            border-top: 2px solid var(--color-border-secondary);
            padding-top: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .total-label { 
            font-size: 14px; 
            color: var(--color-text-secondary); 
            margin-bottom: 0.5rem; 
        }
        .total-amount { 
            font-size: 28px; 
            font-weight: 500; 
            color: var(--color-text-info);
        }
        
        .empty-state { 
            text-align: center; 
            padding: 2rem;
            color: var(--color-text-secondary);
        }
        .empty-state p { font-size: 15px; }
        
        .summary-card {
            background: var(--color-background-secondary); 
            border: none;
        }
        .summary-card p:first-child {
            font-size: 13px; 
            color: var(--color-text-secondary); 
            text-align: center; 
            margin-bottom: 0.5rem; 
        }
        .summary-card p:last-child {
            font-size: 24px; 
            font-weight: 500; 
            text-align: center; 
            color: var(--color-text-primary);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">Calendario de Suscripciones</div>
    
    <div class="week-selector" id="weekSelector"></div>
    
    <div class="card" id="weekCard"></div>
    
    <div class="card summary-card">
        <p>Gasto total mensual</p>
        <p>$38.17</p>
    </div>
</div>

<script>
const suscripciones = {
    "Semana 1 (1-7)": [
        { name: "iCloud", dia: 7, monto: 3.49 }
    ],
    "Semana 2 (8-14)": [
        { name: "Apple Music", dia: 14, monto: 4.04 }
    ],
    "Semana 3 (15-21)": [
        { name: "Setap", dia: 15, monto: 13.00 },
        { name: "Gemini", dia: 19, monto: 2.50 },
        { name: "X", dia: 19, monto: 2.50 }
    ],
    "Semana 4 (22-28)": [
        { name: "monAI", dia: 26, monto: 2.49 },
        { name: "Raycast", dia: 27, monto: 5.25 },
        { name: "YouTube Premium", dia: 28, monto: 5.00 }
    ],
    "Semana 5 (29-31)": []
};

const semanas = Object.keys(suscripciones);
let currentWeek = 0;

function getToday() {
    const today = new Date().getDate();
    if (today <= 7) return 0;
    if (today <= 14) return 1;
    if (today <= 21) return 2;
    if (today <= 28) return 3;
    return 4;
}

currentWeek = getToday();

function renderWeekSelector() {
    const selector = document.getElementById('weekSelector');
    selector.innerHTML = '';
    semanas.forEach((semana, index) => {
        const btn = document.createElement('button');
        btn.textContent = `S${index + 1}`;
        btn.className = index === currentWeek ? 'active' : '';
        btn.onclick = () => {
            currentWeek = index;
            renderWeekSelector();
            renderWeekCard();
        };
        selector.appendChild(btn);
    });
}

function renderWeekCard() {
    const card = document.getElementById('weekCard');
    const semana = semanas[currentWeek];
    const items = suscripciones[semana];
    const total = items.reduce((sum, item) => sum + item.monto, 0);
    
    if (items.length === 0) {
        card.innerHTML = `
            <div class="empty-state">
                <p>No hay suscripciones que pagar esta semana.</p>
            </div>
        `;
    } else {
        let html = `
            <div class="header">
                <h2>${semana}</h2>
                <p>Esta semana tienes los siguientes pagos:</p>
            </div>
            <div class="suscripciones-list">
        `;
        
        items.forEach(item => {
            html += `
                <div class="suscripcion-item">
                    <div class="suscripcion-info">
                        <div class="suscripcion-name">${item.name}</div>
                        <div class="suscripcion-dia">Día ${item.dia} del mes</div>
                    </div>
                    <div class="suscripcion-monto">$${item.monto.toFixed(2)}</div>
                </div>
            `;
        });
        
        html += `
            </div>
            <div class="total-section">
                <div class="total-label">Total a pagar esta semana</div>
                <div class="total-amount">$${total.toFixed(2)}</div>
            </div>
        `;
        
        card.innerHTML = html;
    }
}

renderWeekSelector();
renderWeekCard();
</script>
</body>
</html>
